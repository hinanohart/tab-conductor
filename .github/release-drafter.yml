name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: [feature, enhancement]
  - title: '🐛 Bug Fixes'
    labels: [fix, bugfix, bug]
  - title: '🔒 Security'
    labels: [security]
  - title: '📚 Documentation'
    labels: [documentation, docs]
  - title: '🧰 Maintenance'
    labels: [chore, refactor, style, ci, build, test, perf]
  - title: '⬆️ Dependencies'
    labels: [dependencies, deps]
    collapse-after: 5

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [major, breaking]
  minor:
    labels: [feature, enhancement, minor]
  patch:
    labels: [fix, bug, bugfix, chore, docs, security, dependencies, deps, refactor, style, ci, build, test, perf]
  default: patch

autolabeler:
  - label: feature
    title: ['/^feat(\(.+\))?:/i']
  - label: fix
    title: ['/^fix(\(.+\))?:/i']
  - label: documentation
    title: ['/^docs(\(.+\))?:/i']
  - label: chore
    title: ['/^chore(\(.+\))?:/i']
  - label: refactor
    title: ['/^refactor(\(.+\))?:/i']
  - label: style
    title: ['/^style(\(.+\))?:/i']
  - label: ci
    title: ['/^ci(\(.+\))?:/i']
  - label: build
    title: ['/^build(\(.+\))?:/i']
  - label: test
    title: ['/^test(\(.+\))?:/i']
  - label: perf
    title: ['/^perf(\(.+\))?:/i']
  - label: security
    title: ['/^security(\(.+\))?:/i', '/sec(\(.+\))?:/i']
  - label: dependencies
    title: ['/^build\(deps.*\):/i', '/^chore\(deps.*\):/i']
    branch: ['/^dependabot\//']
  - label: breaking
    title: ['/!:/']
    body: ['/BREAKING CHANGE:/']

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
