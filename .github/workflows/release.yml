name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          fetch-tags: true
      # Refuse to release anything containing maintainer real-identity markers.
      # FRAG pattern: identity tokens are split at source so this guard rule
      # does not self-match against its own definition. Mirrors hairtone /
      # aa-animator / yuragi precedent.
      - name: Identity-leak guard (history-wide)
        run: |
          set -euo pipefail
          FRAG_A='run''za'
          FRAG_B='DESKTOP-[A-Z0-9]+'
          FRAG_C='/mnt/c/'
          FRAG_D='hin''ata'
          PATTERN="${FRAG_A}|${FRAG_A}isongpu|${FRAG_B}|${FRAG_C}|/home/${FRAG_A}|${FRAG_D}"
          FAIL=0
          REFS=$(git for-each-ref --format='%(refname)' refs/tags refs/heads refs/remotes)
          REFS="HEAD $REFS"
          for ref in $REFS; do
            if git grep -n -E "$PATTERN" "$ref" -- \
                ':!*.lock' ':!*.svg' ':!*.png' ':!*.jpg' ':!*.mp4' ':!*.gif' ':!*.npy' \
                ':!.github/workflows/release.yml' \
                > /tmp/leaks.txt 2>/dev/null; then
              echo "::error::Identity-leak at ref $ref:"
              cat /tmp/leaks.txt
              FAIL=1
            fi
          done
          exit $FAIL
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          uv venv
          uv pip install build
          . .venv/bin/activate
          python -m build
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file CHANGELOG.md \
            dist/*
