name: Release Drafter

# `pull_request_target` (instead of `pull_request`) is required so that the
# autolabeler can write labels on PRs coming from forks. We do NOT check out
# untrusted PR code, so the documented fork-attack vector does not apply.
on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # release-drafter/release-drafter@v6 — pinned by SHA per security best practice
      - uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
