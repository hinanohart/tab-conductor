name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install jq + tmux (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y jq tmux
      - name: Install jq + tmux (macOS)
        if: runner.os == 'macOS'
        run: brew install jq tmux
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Ruff lint
        run: . .venv/bin/activate && ruff check src/ tests/
      - name: Ruff format check
        run: . .venv/bin/activate && ruff format --check src/ tests/
      - name: Mypy strict
        run: . .venv/bin/activate && mypy --strict src/tab_conductor/
      - name: Pytest (not e2e) with coverage
        run: |
          . .venv/bin/activate
          # Run once; if a concurrency-stress test trips on the runner, retry once.
          pytest -q -m "not e2e" --cov=tab_conductor --cov-report=xml --cov-fail-under=80 \
            || pytest -q -m "not e2e" --cov=tab_conductor --cov-report=xml --cov-fail-under=80 --lf
      - name: Upload coverage to Codecov
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.12' && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  shell-and-license:
    name: shellcheck + license
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck
      - name: Shellcheck
        run: shellcheck --severity=warning --exclude=SC1091 scripts/*.sh tests/fixtures/*.sh
      - name: Bash syntax check
        run: for f in scripts/*.sh tests/fixtures/*.sh; do bash -n "$f"; done
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: License audit
        run: |
          python -m pip install --upgrade pip pip-licenses
          pip install -e ".[dev]"
          pip-licenses --fail-on='GPL;AGPL;LGPL'

  plan-validate:
    name: validate example plans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update -y && sudo apt-get install -y jq
      - run: uv venv && uv pip install -e ".[dev]"
      - name: Validate every example plan
        run: |
          . .venv/bin/activate
          for d in examples/scenario_*; do
            tab-conductor validate "$d/plan.yaml"
          done
